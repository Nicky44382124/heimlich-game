<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏥 海姆利克急救法 - 儿童学习游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* 标题区 */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: white;
            font-size: 2.5rem;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
        }

        /* 分数和状态 */
        .game-status {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .status-item {
            background: white;
            padding: 12px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #667eea;
        }

        .status-item span {
            font-size: 1.5rem;
        }

        /* 游戏区域 */
        .game-area {
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        /* 场景展示区 */
        .scene-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .scene-card {
            width: 280px;
            height: 200px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            position: relative;
            overflow: hidden;
        }

        .scene-card.success {
            background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
        }

        .scene-card.error {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        }

        .scene-emoji {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .scene-text {
            font-size: 1rem;
            color: #333;
            text-align: center;
            font-weight: bold;
        }

        /* 提示区 */
        .hint-area {
            text-align: center;
            margin-bottom: 20px;
            min-height: 60px;
        }

        .hint-text {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 25px;
            border-radius: 15px;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        /* 进度条 */
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        /* 卡片区域 */
        .cards-section {
            margin-bottom: 20px;
        }

        .cards-section-title {
            text-align: center;
            color: #888;
            font-size: 1rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* 已选卡片区域 */
        .selected-cards-area {
            background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 60px;
        }

        .selected-cards-area:empty::after {
            content: '答对的卡片会出现在这里';
            color: #555;
            font-style: italic;
        }

        /* 待选卡片区域 */
        .available-cards-area {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            border-radius: 15px;
            padding: 15px;
        }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .step-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            text-align: center;
            min-width: 200px;
            max-width: 250px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            border: 3px solid transparent;
        }

        .step-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .step-card.selected {
            border-color: #ffd700;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        .step-card.wrong {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #666;
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 已选卡片的样式 */
        .step-card.selected-card {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: white;
            cursor: default;
            border: 3px solid #ffd700;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4);
            animation: popIn 0.4s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* 重新开始按钮 */
        .restart-btn {
            display: block;
            margin: 25px auto 0;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.5);
        }

        /* 结果弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            max-width: 500px;
            animation: popIn 0.5s ease;
        }

        .modal-emoji {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .modal-title {
            color: #667eea;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .modal-text {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .modal-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn:hover {
            transform: scale(1.05);
        }

        /* 星星动画 */
        .stars {
            font-size: 2rem;
            margin: 15px 0;
        }

        /* 底部信息 */
        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }
            .scene-card {
                width: 100%;
                height: auto;
                min-height: 150px;
            }
            .step-card {
                min-width: 150px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 标题 -->
        <div class="header">
            <h1>🏥 海姆利克急救法学习游戏</h1>
            <p>帮助小朋友学习如何正确救助窒息的人</p>
        </div>

        <!-- 游戏状态 -->
        <div class="game-status">
            <div class="status-item">
                <span>⭐</span>
                <span id="score">0</span> 分
            </div>
            <div class="status-item">
                <span>🔢</span>
                第 <span id="currentStep">1</span> / <span id="totalSteps">8</span> 步
            </div>
        </div>

        <!-- 游戏区域 -->
        <div class="game-area">
            <!-- 场景展示 -->
            <div class="scene-area" id="sceneArea">
                <!-- 动态生成 -->
            </div>

            <!-- 提示 -->
            <div class="hint-area">
                <div class="hint-text" id="hintText">
                    👇 请按正确顺序点击卡片
                </div>
            </div>

            <!-- 进度条 -->
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>

            <!-- 已选卡片区域 -->
            <div class="cards-section">
                <div class="cards-section-title">✅ 已选择的步骤</div>
                <div class="selected-cards-area" id="selectedCardsArea">
                    <!-- 答对的卡片会移动到这里 -->
                </div>
            </div>

            <!-- 待选卡片区域 -->
            <div class="cards-section">
                <div class="cards-section-title">🎯 请选择下一步</div>
                <div class="available-cards-area">
                    <div class="cards-container" id="cardsContainer">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>

            <!-- 重新开始 -->
            <button class="restart-btn" onclick="restartGame()">🔄 重新开始</button>
        </div>

        <!-- 底部 -->
        <div class="footer">
            💡 记住：遇到紧急情况，要马上找大人帮忙！
        </div>
    </div>

    <!-- 结果弹窗 -->
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <div class="modal-emoji" id="modalEmoji">🎉</div>
            <div class="modal-title" id="modalTitle">太棒了！</div>
            <div class="stars" id="modalStars">⭐⭐⭐</div>
            <div class="modal-text" id="modalText">
                你已经学会了海姆利克急救法的正确步骤！
            </div>
            <button class="modal-btn" onclick="closeModal()">继续练习</button>
        </div>
    </div>

    <script>
        // 海姆利克急救法8步骤（儿童版）
        const steps = [
            {
                id: 1,
                text: "🔍 发现有人呛到了",
                emoji: "😰"
            },
            {
                id: 2,
                text: "🧍 站到他的身后",
                emoji: "👆"
            },
            {
                id: 3,
                text: "🤗 双手环抱他的腰部",
                emoji: "💪"
            },
            {
                id: 4,
                text: "✌️ 一手做剪刀状，放在肚脐上部",
                emoji: "✌️"
            },
            {
                id: 5,
                text: "✊ 另一手握拳放在上部，拳眼贴腹部",
                emoji: "🤜"
            },
            {
                id: 6,
                text: "☀️ 用另一只手包住拳头",
                emoji: "🤝"
            },
            {
                id: 7,
                text: "💥 快速向内上方推压",
                emoji: "💨"
            },
            {
                id: 8,
                text: "🔄 重复推压直到东西出来",
                emoji: "🏆"
            }
        ];

        // 游戏状态
        let gameState = {
            currentStep: 0,
            score: 0,
            correctAnswers: 0,
            totalSteps: steps.length,
            selectedCard: null,
            isAnimating: false,
            usedCards: new Set() // 记录已使用的卡片ID
        };

        // 初始化游戏
        function initGame() {
            gameState = {
                currentStep: 0,
                score: 0,
                correctAnswers: 0,
                totalSteps: steps.length,
                selectedCard: null,
                isAnimating: false,
                usedCards: new Set()
            };
            
            // 清空已选卡片区域
            document.getElementById('selectedCardsArea').innerHTML = '';
            
            updateUI();
            renderSceneArea();
            renderCards();
        }

        // 更新UI
        function updateUI() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('currentStep').textContent = gameState.currentStep + 1;
            document.getElementById('totalSteps').textContent = gameState.totalSteps;

            const progress = (gameState.currentStep / gameState.totalSteps) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        // 渲染场景区域
        function renderSceneArea() {
            const container = document.getElementById('sceneArea');
            container.innerHTML = '';

            // 左边：当前步骤图示
            const currentCard = document.createElement('div');
            currentCard.className = 'scene-card';
            currentCard.id = 'currentScene';
            currentCard.innerHTML = `
                <div class="scene-emoji">🤔</div>
                <div class="scene-text">等待选择...</div>
            `;
            container.appendChild(currentCard);

            // 右边：已完成的步骤
            const completedCard = document.createElement('div');
            completedCard.className = 'scene-card';
            completedCard.innerHTML = `
                <div class="scene-emoji">✅</div>
                <div class="scene-text">已完成 ${gameState.currentStep} / ${gameState.totalSteps} 步</div>
            `;
            container.appendChild(completedCard);
        }

        // 渲染待选卡片
        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            if (gameState.currentStep >= gameState.totalSteps) {
                return;
            }

            // 随机打乱步骤顺序
            const shuffledSteps = [...steps].sort(() => Math.random() - 0.5);

            shuffledSteps.forEach(step => {
                // 跳过已使用的卡片
                if (gameState.usedCards.has(step.id)) {
                    return;
                }
                
                const card = document.createElement('div');
                card.className = 'step-card';
                card.dataset.id = step.id;
                card.innerHTML = step.text;
                card.onclick = () => selectCard(step, card);
                container.appendChild(card);
            });
        }

        // 选择卡片
        function selectCard(step, cardElement) {
            if (gameState.isAnimating) {
                return;
            }

            // 清除之前的选中状态
            document.querySelectorAll('.step-card').forEach(c => c.classList.remove('selected'));

            // 选中当前卡片
            cardElement.classList.add('selected');
            gameState.selectedCard = step;

            // 延迟后检查答案
            setTimeout(() => {
                checkAnswer(step, cardElement);
            }, 500);
        }

        // 检查答案
        function checkAnswer(step, cardElement) {
            gameState.isAnimating = true;

            const currentStep = steps[gameState.currentStep];
            const isCorrect = step.id === currentStep.id;

            const sceneCard = document.getElementById('currentScene');

            if (isCorrect) {
                // 正确 - 卡片移动到上方绿色区域
                cardElement.classList.remove('selected');
                cardElement.classList.add('selected-card');
                cardElement.style.cursor = 'default';
                
                // 移动到已选区域
                const selectedArea = document.getElementById('selectedCardsArea');
                selectedArea.appendChild(cardElement);

                sceneCard.className = 'scene-card success';
                sceneCard.innerHTML = `
                    <div class="scene-emoji">${step.emoji}</div>
                    <div class="scene-text">${step.text}</div>
                `;

                gameState.score += 10;
                gameState.correctAnswers++;
                gameState.usedCards.add(step.id);
                gameState.currentStep++;

                // 添加成功动画效果
                showSuccessAnimation(sceneCard);

            } else {
                // 错误 - 卡片变红并禁用
                cardElement.classList.remove('selected');
                cardElement.classList.add('wrong');
                cardElement.style.pointerEvents = 'none'; // 禁用点击

                sceneCard.className = 'scene-card error';
                sceneCard.innerHTML = `
                    <div class="scene-emoji">🤔</div>
                    <div class="scene-text">选错了，再想想！</div>
                `;

                // 添加抖动动画
                showErrorAnimation(sceneCard);
            }

            setTimeout(() => {
                updateUI();
                gameState.isAnimating = false;

                // 检查是否完成
                if (gameState.currentStep >= gameState.totalSteps) {
                    showResult();
                } else {
                    renderCards();
                }
            }, 1000);
        }

        // 成功动画
        function showSuccessAnimation(element) {
            element.style.transform = 'scale(1.1)';
            element.style.transition = 'transform 0.3s ease';
            setTimeout(() => {
                element.style.transform = 'scale(1)';
            }, 300);
        }

        // 错误动画
        function showErrorAnimation(element) {
            element.style.animation = 'shake 0.5s ease';
            setTimeout(() => {
                element.style.animation = '';
            }, 500);
        }

        // 显示结果
        function showResult() {
            const modal = document.getElementById('resultModal');
            const stars = gameState.correctAnswers === gameState.totalSteps ? '⭐⭐⭐' :
                          gameState.correctAnswers >= gameState.totalSteps * 0.7 ? '⭐⭐' : '⭐';

            document.getElementById('modalStars').textContent = stars;
            document.getElementById('modalEmoji').textContent =
                gameState.correctAnswers === gameState.totalSteps ? '🎉' :
                gameState.correctAnswers >= gameState.totalSteps * 0.7 ? '👏' : '💪';
            document.getElementById('modalTitle').textContent =
                gameState.correctAnswers === gameState.totalSteps ? '太棒了！满分！' :
                '做得很好！';
            document.getElementById('modalText').innerHTML =
                `你获得了 <strong>${gameState.score}</strong> 分！<br><br>` +
                `💡 重要提醒：遇到有人窒息，要马上找大人帮忙！<br>小朋友学会后，可以在大人做急救时帮忙拨打120！`;

            modal.classList.add('show');
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('resultModal').classList.remove('show');
            initGame();
        }

        // 重新开始
        function restartGame() {
            initGame();
        }

        // 启动游戏
        initGame();
    </script>
</body>
</html>
